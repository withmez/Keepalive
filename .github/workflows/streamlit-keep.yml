name: Streamlit 自动唤醒

on:
  workflow_dispatch:
  repository_dispatch:
    types: [streamlit]
  # schedule:
  #   - cron: '0 0 * * *' # 每天 UTC 00:00 运行

jobs:
  streamlit-wakeup:
    if: github.event_name != 'repository_dispatch' || contains(github.event.client_payload.status, 'Down')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 调试 - 打印收到的 client_payload
        run: |
          echo "event_name: ${{ github.event_name }}"
          echo 'client_payload: ${{ toJSON(github.event.client_payload) }}'
  
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装 Chromium
        uses: browser-actions/setup-chromium@v2
        
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装 Python 依赖
        working-directory: streamlit
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行 Streamlit 唤醒脚本
        working-directory: streamlit
        env:
          STREAMLIT_APP_URL: ${{ vars.STREAMLIT_APP_URL }}
        run: |
          python autorun.py
